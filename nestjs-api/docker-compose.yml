version: '3.8'

services:
  api:
    build: .
    container_name: nestjs_api
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: yourdb
      MYSQL_USER: youruser
      MYSQL_PASSWORD: yourpassword
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - app_network

volumes:
  mysqldata:

networks:
  app_network:
    driver: bridge
